name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Git configuration
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Force add remote and push
          # Note: vickey92 is your HF username from the previous screenshot
          git remote add hf https://vickey92:$HF_TOKEN@huggingface.co/spaces/vickey92/cv || git remote set-url hf https://vickey92:$HF_TOKEN@huggingface.co/spaces/vickey92/cv
          
          git push --force hf main
